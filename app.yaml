# Databricks Apps deployment configuration

# Start uvicorn directly — the wheel will be installed by Databricks via the libraries entry.
command:
  - "uvicorn"
  - "grants_gov_mcp.app:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "${DATABRICKS_APP_PORT:-8000}"
  - "--proxy-headers"
  # Optional: add '--workers' and number if you want multiple worker processes,
  # e.g. "--workers", "2"