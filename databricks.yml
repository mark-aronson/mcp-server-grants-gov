bundle:
  name: mcp-server-grants-gov
  databricks_cli_version: ">=0.218.0"

variables:
  ENV:
    default: dev
    description: "Deployment environment (overridden by target variables)"

# include only files that should be synced/packaged
sync:
  include:
    - 'app.yaml'
    - 'dist/*.whl'
    - 'src/**'
  exclude:
    - '.git/**'

# resource definitions embedded here to avoid include ambiguities:
# apps:
#   grants_gov_mcp_server:
#     name: mcp-server-grants-gov
#     app:
#       workspace_path: "${bundle.targets.${bundle.target}.workspace.root_path}/mcp-server"
#       app_spec_path: "app.yaml"
#       libraries:
#         - whl: "../dist/*.whl"
#       env:
#         APP_ENV: "${bundle.targets.${bundle.target}.variables.ENV}"

artifacts:
  default:
    type: whl
    path: .
    build: python -m build --no-isolation
    dynamic_version: false
    files:
      - source: dist/*.whl

targets:
  dev:
    default: true
    workspace:
      root_path: /Workspace/mcp-tiger-team/mcp-server-repos/mcp-server-grants-gov
    variables:
      ENV: dev